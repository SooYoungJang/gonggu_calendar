appId: com.gonggu.wish
---
# Evidence flow: used by the test runner for collecting visual evidence
# across device widths. Run with:
#   maestro test --flow .maestro/ranking-evidence.yaml ...(device-specific args)
#
# This flow mirrors the split approach — pre-scroll and post-scroll
# each get their own launchApp so the XCUITest runner is fresh after
# the programmatic swipe (known to cause intermittent runner crashes).

- launchApp
- tapOn: "랭킹 탭"
- assertVisible: "쇼핑몰 랭킹"
- assertVisible: "스토어 랭킹"
- assertVisible: "브랜드명, 제품명, 셀러명으로 검색"
- takeScreenshot: evidence/01-ranking-tab
- scroll
- takeScreenshot: evidence/02-ranking-scroll
- launchApp
- tapOn: "랭킹 탭"
- assertVisible: "쇼핑몰 랭킹"
- scroll
- takeScreenshot: evidence/03-ranking-scroll-2
- scroll
- takeScreenshot: evidence/04-safearea-bottom
