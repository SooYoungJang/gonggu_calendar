services:
  postgres:
    image: postgres:16-alpine
    container_name: gonggu-postgres
    environment:
      POSTGRES_DB: gonggu_calendar
      POSTGRES_USER: gonggu
      POSTGRES_PASSWORD: gonggu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gonggu -d gonggu_calendar"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: gonggu-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
