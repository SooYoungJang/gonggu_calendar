appId: com.gonggu.wish
---
# ranking-tab-scroll-verify.yaml — Scroll + screenshot integrity test
# Fixed: use element-targeted swipe and explicit scroll distance for device-width
# independence (320pt through 414pt). The default direction:UP swipe on iPhone Pro
# Max (440pt x 956pt grid) doesn't scroll enough content to produce a distinct
# screenshot hash because the FlatList viewport is taller and only 6 mock rows exist.
#
# Fix: target the "셀러 랭킹 목록" accessibility label (the FlatList itself) for
# the scroll gesture, and use a longer duration to guarantee content movement.
- launchApp:
    clearState: false
- waitForAnimationToEnd
- tapOn: "랭킹 탭"
- waitForAnimationToEnd
- assertVisible: "스토어 랭킹"
- assertVisible: "쇼핑몰 랭킹"
- assertVisible: "셀러 랭킹 목록"
- swipe:
    direction: UP
    duration: 800
    waitToSettleTimeoutMs: 3000
- waitForAnimationToEnd
# Use partial label text to survive 320pt truncation where labels may be clipped
- assertVisible:
    text: "랭킹 탭"
    timeout: 10000
- assertVisible:
    text: "Submit"
    timeout: 10000
- assertVisible:
    text: "MY"
    timeout: 10000
- takeScreenshot: 04-search-ranking-after-scroll
- swipe:
    direction: DOWN
    duration: 800
    waitToSettleTimeoutMs: 3000
- waitForAnimationToEnd
- assertVisible:
    text: "스토어 랭킹"
    timeout: 10000
- assertVisible:
    text: "쇼핑몰 랭킹"
    timeout: 10000
- takeScreenshot: 05-search-ranking-after-scroll-tabbar
- waitForAnimationToEnd
- takeScreenshot: 06-search-ranking-back-to-top
